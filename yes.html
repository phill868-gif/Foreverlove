<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Memories 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: Georgia, serif;
  background: linear-gradient(135deg, #ffe8b0, #ecd8ff);
}

/* MAIN HEADER */
h1 {
  font-size: 22px;
  color: #5e3b87;
  margin-top: 25px;
}

/* 💖 ROMANTIC MESSAGE */
.message {
  max-width: 85%;
  margin: 10px auto 0;
  font-size: 15px;
  line-height: 1.6;
  color: #6b4aa0;
  font-style: italic;
}

/* MUSIC BUTTON */
.music-btn {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: #d4af37;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

/* MEMORIES TITLE */
.memories {
  margin-top: 20px;
  font-size: 20px;
  font-weight: 500;
  color: #d4af37;
}

/* SLIDER */
.slider {
  position: relative;
  width: 320px;
  height: 420px;
  margin: 15px auto 40px;
  overflow: hidden;
  border-radius: 15px;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.active {
  opacity: 1;
}

.slide img,
.slide video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 💖 HEADER -->
<h1>Happy Birthday My QUEEN💖</h1>

<!-- 💬 NEW ROMANTIC TEXT -->
<div class="message">
  Happy birthday my heartbeat, my world, obim 💖<br>
  I'm sorry I'm not there for our birthday 🎂 ✨
</div>

<!-- 🎵 MUSIC BUTTON -->
<button class="music-btn" id="musicBtn">💖 Play Music</button>

<!-- 💎 MEMORIES -->
<div class="memories">MEMORIES💞💖</div>

<!-- SLIDER -->
<div class="slider">

  <div class="slide active"><img src="photo1.jpg"></div>
  <div class="slide"><img src="photo2.jpg"></div>
  <div class="slide"><img src="photo3.jpg"></div>
  <div class="slide"><img src="photo4.jpg"></div>
  <div class="slide"><img src="photo5.jpg"></div>
  <div class="slide"><img src="photo6.jpg"></div>
  <div class="slide"><img src="photo7.jpg"></div>
  <div class="slide"><img src="photo8.jpg"></div>
  <div class="slide"><img src="photo9.jpg"></div>

  <div class="slide"><video src="video1.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video2.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video3.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video4.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video5.mp4" muted playsinline></video></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const music = document.getElementById("bgMusic");
  const btn = document.getElementById("musicBtn");

  let started = false;

  // 🎵 MUSIC START (ONCE ONLY)
  btn.addEventListener("click", () => {

    if (!started) {
      started = true;

      music.volume = 0;
      music.play().catch(() => {});

      let v = 0;
      let fade = setInterval(() => {
        if (v < 0.5) {
          v += 0.05;
          music.volume = v;
        } else {
          clearInterval(fade);
        }
      }, 150);

      btn.innerText = "🎵 Playing...";
      btn.disabled = true;
      btn.style.opacity = "0.6";
    }

  });

  // SLIDER
  let slides = document.querySelectorAll(".slide");
  let index = 0;
  let timer;

  function stopVideos() {
    slides.forEach(s => {
      let v = s.querySelector("video");
      if (v) {
        v.pause();
        v.currentTime = 0;
      }
    });
  }

  function showSlide(i) {

    clearTimeout(timer);
    stopVideos();

    slides.forEach(s => s.classList.remove("active"));

    let current = slides[i];
    current.classList.add("active");

    let video = current.querySelector("video");

    if (video) {
      video.play().catch(() => {
        timer = setTimeout(nextSlide, 3000);
      });
      video.onended = nextSlide;
    } else {
      timer = setTimeout(nextSlide, 5000);
    }
  }

  function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
  }

  showSlide(index);

});
</script>

</body>
</html>
