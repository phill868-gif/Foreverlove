<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Memories 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: Georgia, serif;
  background: linear-gradient(135deg, #ffe8b0, #ecd8ff);
}

/* HEADER */
h1 {
  font-size: 22px;
  color: #5e3b87;
  margin-top: 25px;
}

/* MESSAGE */
.message {
  max-width: 85%;
  margin: 10px auto;
  font-size: 15px;
  color: #6b4aa0;
  font-style: italic;
  line-height: 1.6;
}

/* MUSIC BUTTON */
.music-btn {
  margin-top: 10px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: #d4af37;
  color: white;
  font-size: 14px;
  cursor: pointer;
}

/* MEMORIES */
.memories {
  margin-top: 18px;
  font-size: 20px;
  font-weight: 500;
  color: #d4af37;
}

/* SLIDER */
.slider {
  position: relative;
  width: 320px;
  height: 420px;
  margin: 20px auto 40px;
  overflow: hidden;
  border-radius: 15px;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.6s ease;
}

.active {
  opacity: 1;
}

.slide img,
.slide video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<h1>Happy Birthday My Love 💖</h1>

<div class="message">
  Happy birthday my heartbeat, my world 💖<br>
  Today is all about you and how much you mean to me ✨
</div>

<button class="music-btn" id="musicBtn">💖 Play Music</button>

<div class="memories">Memories 💖</div>

<div class="slider">

  <!-- IMAGES -->
  <div class="slide active"><img src="photo1.jpg"></div>
  <div class="slide"><img src="photo2.jpg"></div>
  <div class="slide"><img src="photo3.jpg"></div>
  <div class="slide"><img src="photo4.jpg"></div>
  <div class="slide"><img src="photo5.jpg"></div>
  <div class="slide"><img src="photo6.jpg"></div>
  <div class="slide"><img src="photo7.jpg"></div>
  <div class="slide"><img src="photo8.jpg"></div>
  <div class="slide"><img src="photo9.jpg"></div>

  <!-- VIDEOS -->
  <div class="slide"><video src="video1.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video2.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video3.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video4.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video5.mp4" muted playsinline></video></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const music = document.getElementById("bgMusic");
  const btn = document.getElementById("musicBtn");

  let musicStarted = false;

  // 🎵 MUSIC (ONE TIME START)
  btn.addEventListener("click", () => {

    if (!musicStarted) {
      musicStarted = true;

      music.volume = 0;
      music.play().catch(() => {});

      let v = 0;
      let fade = setInterval(() => {
        if (v < 0.5) {
          v += 0.05;
          music.volume = v;
        } else {
          clearInterval(fade);
        }
      }, 120);

      btn.innerText = "🎵 Playing...";
      btn.disabled = true;
      btn.style.opacity = "0.6";
    }

  });

  // =========================
  // 💎 PRELOAD MEDIA (FIX SKIPS)
  // =========================
  const slides = document.querySelectorAll(".slide");

  slides.forEach(slide => {

    const img = slide.querySelector("img");
    const video = slide.querySelector("video");

    if (img) {
      const pre = new Image();
      pre.src = img.src;
    }

    if (video) {
      video.preload = "auto";
      video.load();
    }

  });

  // =========================
  // 🎞 SLIDER ENGINE (SMOOTH)
  // =========================
  let index = 0;
  let timer;

  function stopVideos() {
    slides.forEach(s => {
      let v = s.querySelector("video");
      if (v) {
        v.pause();
        v.currentTime = 0;
      }
    });
  }

  function showSlide(i) {

    clearTimeout(timer);
    stopVideos();

    slides.forEach(s => s.classList.remove("active"));

    let current = slides[i];
    current.classList.add("active");

    let video = current.querySelector("video");

    if (video) {

      const playVideo = () => {
        video.play().catch(() => {
          timer = setTimeout(nextSlide, 2500);
        });
      };

      if (video.readyState >= 2) {
        playVideo();
      } else {
        video.onloadeddata = playVideo;
      }

      video.onended = nextSlide;

    } else {
      timer = setTimeout(nextSlide, 5000);
    }
  }

  function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
  }

  showSlide(index);

});
</script>

</body>
</html>
