<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Birthday Girl 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: 'Georgia', serif;
  overflow-x: hidden;
  background: linear-gradient(135deg, #ffe8b0, #ecd8ff);
  animation: glow 8s infinite alternate;
}

@keyframes glow {
  from { background: linear-gradient(135deg, #ffe8b0, #ecd8ff); }
  to { background: linear-gradient(135deg, #ffd700, #d8b4ff); }
}

.container {
  margin-top: 10vh;
  padding: 20px;
}

h1 {
  font-size: 24px;
  font-weight: 400;
  color: #5e3b87;
  line-height: 1.6;
}

.initials {
  margin-top: 10px;
  font-size: 18px;
  color: #d4af37;
}

/* SLIDER */
.slider {
  position: relative;
  width: 320px;
  height: 420px;
  margin: 25px auto;
  overflow: hidden;
  border-radius: 15px;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.4s ease; /* FAST transition */
}

.active {
  opacity: 1;
}

/* MEDIA */
.slide img,
.slide video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 15px;
}

/* MUSIC */
audio {
  display: none;
}
</style>
</head>

<body>

<!-- 🎵 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <h1>
    You are my Queen 💖<br>
    My peace, my love, my happiness ✨<br>
    Happy Birthday my love 💕
  </h1>

  <div class="initials">Memories ❤️</div>

  <!-- SLIDER -->
  <div class="slider">

    <!-- PHOTOS -->
    <div class="slide active"><img src="photo1.jpg"></div>
    <div class="slide"><img src="photo2.jpg"></div>
    <div class="slide"><img src="photo3.jpg"></div>
    <div class="slide"><img src="photo4.jpg"></div>
    <div class="slide"><img src="photo5.jpg"></div>
    <div class="slide"><img src="photo6.jpg"></div>
    <div class="slide"><img src="photo7.jpg"></div>
    <div class="slide"><img src="photo8.jpg"></div>
    <div class="slide"><img src="photo9.jpg"></div>

    <!-- VIDEOS -->
    <div class="slide"><video src="video1.mp4" muted playsinline></video></div>
    <div class="slide"><video src="video2.mp4" muted playsinline></video></div>
    <div class="slide"><video src="video3.mp4" muted playsinline></video></div>
    <div class="slide"><video src="video4.mp4" muted playsinline></video></div>
    <div class="slide"><video src="video5.mp4" muted playsinline></video></div>

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  let slides = document.querySelectorAll(".slide");
  let index = 0;
  let timer;

  // 🎵 MUSIC START (browser-safe)
  const music = document.getElementById("bgMusic");

  document.body.addEventListener("click", () => {
    music.play().catch(() => {});
  }, { once: true });

  function stopVideos() {
    slides.forEach(slide => {
      let v = slide.querySelector("video");
      if (v) {
        v.pause();
        v.currentTime = 0;
      }
    });
  }

  function showSlide(i) {

    clearTimeout(timer);
    stopVideos();

    slides.forEach(slide => slide.classList.remove("active"));

    let current = slides[i];

    // ⚡ INSTANT SWITCH (NO DELAY)
    current.classList.add("active");

    let video = current.querySelector("video");

    if (video) {

      video.muted = true;
      video.playsInline = true;

      // 🎬 PLAY IMMEDIATELY
      video.play().catch(() => {
        timer = setTimeout(nextSlide, 3000);
      });

      video.onended = () => {
        nextSlide();
      };

    } else {
      // 📸 IMAGE = 5 SECONDS
      timer = setTimeout(nextSlide, 5000);
    }
  }

  function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
  }

  showSlide(index);

});
</script>

</body>
</html>
