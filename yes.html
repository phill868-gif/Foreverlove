<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Birthday Girl 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: 'Georgia', serif;
  overflow-x: hidden;
  background: linear-gradient(135deg, #ffe8b0, #ecd8ff);
  animation: glow 8s infinite alternate;
}

@keyframes glow {
  from { background: linear-gradient(135deg, #ffe8b0, #ecd8ff); }
  to { background: linear-gradient(135deg, #ffd700, #d8b4ff); }
}

.container {
  margin-top: 10vh;
  padding: 20px;
}

h1 {
  font-size: 24px;
  font-weight: 400;
  color: #5e3b87;
  line-height: 1.6;
}

.initials {
  margin-top: 10px;
  font-size: 18px;
  color: #d4af37;
}

/* SLIDER */
.slider {
  position: relative;
  width: 320px;
  height: 420px;
  margin: 25px auto;
  overflow: hidden;
  border-radius: 15px;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1.2s ease;
}

.active {
  opacity: 1;
}

/* IMAGE + VIDEO */
.slide img,
.slide video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 15px;
}

/* GLITTER */
.glitter {
  position: fixed;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* HEARTS */
.heart {
  position: fixed;
  font-size: 18px;
  animation: floatUp 6s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

  <h1>
    You asked Me not to post you, so i made something a little Special just for you💖<br>
    You are my Queen, my peace, my love, my happiness, mi amor 💕 ✨
    I hope you love it, Happy Birthday Obim
    I may not be there but i want you to know i love you so much 💖 💖 
  </h1>

  <div class="initials">Memories ❤️</div>

  <!-- SLIDER -->
  <div class="slider">

    <!-- PHOTOS -->
    <div class="slide active"><img src="photo1.jpg"></div>
    <div class="slide"><img src="photo2.jpg"></div>
    <div class="slide"><img src="photo3.jpg"></div>
    <div class="slide"><img src="photo4.jpg"></div>
    <div class="slide"><img src="photo5.jpg"></div>
    <div class="slide"><img src="photo6.jpg"></div>
    <div class="slide"><img src="photo7.jpg"></div>
    <div class="slide"><img src="photo8.jpg"></div>
    <div class="slide"><img src="photo9.jpg"></div>

    <!-- VIDEOS -->
    <div class="slide"><video src="video1.mp4" muted playsinline></video></div>
    <div class="slide"><video src="video2.mp4" muted playsinline></video></div>
    <div class="slide"><video src="video3.mp4" muted playsinline></video></div>
    <div class="slide"><video src="video4.mp4" muted playsinline></video></div>
    <div class="slide"><video src="video5.mp4" muted playsinline></video></div>

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  let slides = document.querySelectorAll(".slide");
  let index = 0;
  let timer;

  function clearVideos() {
    slides.forEach(slide => {
      let video = slide.querySelector("video");
      if (video) {
        video.pause();
        video.currentTime = 0;
      }
    });
  }

  function showSlide(i) {

    clearTimeout(timer);
    clearVideos();

    slides.forEach(slide => slide.classList.remove("active"));

    let current = slides[i];
    current.classList.add("active");

    let video = current.querySelector("video");

    if (video) {

      video.muted = true;
      video.playsInline = true;

      let playPromise = video.play();

      if (playPromise !== undefined) {
        playPromise.catch(() => {
          timer = setTimeout(nextSlide, 5000);
        });
      }

      video.onended = () => {
        nextSlide();
      };

    } else {
      // IMAGE DISPLAY TIME = 8 SECONDS
      timer = setTimeout(nextSlide, 8000);
    }
  }

  function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
  }

  showSlide(index);

});
</script>

</body>
</html>
