<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Birthday Girl 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: Georgia, serif;
  background: linear-gradient(135deg, #ffe8b0, #ecd8ff);
}

.container {
  margin-top: 8vh;
}

h1 {
  font-size: 22px;
  color: #5e3b87;
}

.memories-title {
  margin-top: 20px;
  font-size: 20px;
  color: #d4af37;
}

/* BUTTON */
.music-btn {
  margin-top: 10px;
  padding: 10px 18px;
  border-radius: 20px;
  border: none;
  background: #d4af37;
  color: white;
  cursor: pointer;
}

/* SLIDER */
.slider {
  position: relative;
  width: 320px;
  height: 420px;
  margin: 20px auto;
  overflow: hidden;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.4s ease;
}

.active {
  opacity: 1;
}

.slide img,
.slide video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="container">

  <h1>Happy Birthday My Love 💖</h1>

  <button class="music-btn" id="musicBtn">💖 Play Music</button>

  <div class="memories-title">Memories 💖</div>

  <div class="slider">

    <!-- IMAGES -->
    <div class="slide active"><img src="photo1.jpg" onerror="this.style.display='none'"></div>
    <div class="slide"><img src="photo2.jpg" onerror="this.style.display='none'"></div>
    <div class="slide"><img src="photo3.jpg" onerror="this.style.display='none'"></div>
    <div class="slide"><img src="photo4.jpg" onerror="this.style.display='none'"></div>
    <div class="slide"><img src="photo5.jpg" onerror="this.style.display='none'"></div>

    <!-- VIDEOS -->
    <div class="slide"><video src="video1.mp4" muted playsinline></video></div>
    <div class="slide"><video src="video2.mp4" muted playsinline></video></div>

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const music = document.getElementById("bgMusic");
  const btn = document.getElementById("musicBtn");

  // MUSIC CONTROL (SAFE)
  btn.onclick = function () {
    if (music.paused) {
      music.play().catch(() => {});
      btn.innerText = "🔇 Pause Music";
    } else {
      music.pause();
      btn.innerText = "💖 Play Music";
    }
  };

  // SLIDER
  let slides = document.querySelectorAll(".slide");
  let index = 0;

  function showSlide(i) {
    slides.forEach(s => s.classList.remove("active"));
    let current = slides[i];
    current.classList.add("active");

    let video = current.querySelector("video");

    if (video) {
      video.currentTime = 0;

      video.play().catch(() => {
        setTimeout(nextSlide, 3000);
      });

      video.onended = nextSlide;

    } else {
      setTimeout(nextSlide, 5000);
    }
  }

  function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
  }

  showSlide(index);

});
</script>

</body>
</html>
