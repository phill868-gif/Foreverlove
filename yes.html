<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: 'Georgia', serif;
  overflow-x: hidden;
  background: linear-gradient(135deg, #ffe8b0, #ecd8ff);
  animation: glow 8s infinite alternate;
}

@keyframes glow {
  from { background: linear-gradient(135deg, #ffe8b0, #ecd8ff); }
  to { background: linear-gradient(135deg, #ffd700, #d8b4ff); }
}

/* MAIN TEXT */
.container {
  margin-top: 10vh;
  padding: 20px;
}

h1 {
  font-size: 24px;
  font-weight: 400;
  color: #5e3b87;
  line-height: 1.6;
}

/* INITIALS */
.initials {
  margin-top: 10px;
  font-size: 18px;
  color: #d4af37;
}

/* SLIDER */
.slider {
  position: relative;
  width: 320px;
  height: 420px;
  margin: 25px auto;
  overflow: hidden;
  border-radius: 15px;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 1.2s ease;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 15px;
}

.active {
  opacity: 1;
}

/* GLITTER */
.glitter {
  position: fixed;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-10vh); opacity: 1; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* HEARTS */
.heart {
  position: fixed;
  font-size: 18px;
  animation: floatUp 6s linear forwards;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">

  <h1>
    I knew you would pick YES 💖<br>
    You are my peace, my love, my forever ✨
  </h1>

  <!-- YOUR INITIALS -->
  <div class="initials">A ❤️ (replace with your initials)</div>

  <!-- SLIDER -->
  <div class="slider">

    <div class="slide active"><img src="photo1.jpg"></div>
    <div class="slide"><img src="photo2.jpg"></div>
    <div class="slide"><img src="photo3.jpg"></div>
    <div class="slide"><img src="photo4.jpg"></div>
    <div class="slide"><img src="photo5.jpg"></div>
    <div class="slide"><img src="photo6.jpg"></div>
    <div class="slide"><img src="photo7.jpg"></div>
    <div class="slide"><img src="photo8.jpg"></div>
    <div class="slide"><img src="photo9.jpg"></div>

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  // SLIDER FIX (IMPORTANT)
  let slides = document.querySelectorAll(".slide");
  let index = 0;

  function showSlide() {
    slides.forEach(s => s.classList.remove("active"));
    slides[index].classList.add("active");

    index++;
    if (index >= slides.length) {
      index = 0;
    }

    setTimeout(showSlide, 3000);
  }

  showSlide();

  // GLITTER
  for (let i = 0; i < 150; i++) {
    let g = document.createElement("div");
    g.className = "glitter";
    g.style.left = Math.random() * window.innerWidth + "px";
    g.style.animationDuration = (Math.random() * 4 + 2) + "s";
    g.style.background = Math.random() > 0.5 ? "#ffd700" : "#c8a2ff";
    document.body.appendChild(g);
  }

  // HEARTS
  setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * window.innerWidth + "px";
    h.style.bottom = "0px";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 6000);
  }, 800);

});
</script>

</body>
</html>
