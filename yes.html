<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Memories 💖</title>

<style>
body {
  margin: 0;
  padding: 0;
  text-align: center;
  font-family: Georgia, serif;
  background: linear-gradient(135deg, #ffe8b0, #ecd8ff);
}

/* HEADER */
h1 {
  font-size: 22px;
  color: #5e3b87;
  margin-top: 30px;
}

/* MEMORIES TITLE */
.memories {
  margin-top: 15px;
  font-size: 20px;
  color: #d4af37;
}

/* MUSIC BUTTON */
button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 20px;
  background: #d4af37;
  color: white;
  cursor: pointer;
  font-size: 14px;
}

/* SLIDER */
.slider {
  position: relative;
  width: 320px;
  height: 420px;
  margin: 25px auto;
  overflow: hidden;
  border-radius: 15px;
}

.slide {
  position: absolute;
  width: 100%;
  height: 100%;
  opacity: 0;
  transition: opacity 0.5s ease;
}

.active {
  opacity: 1;
}

.slide img,
.slide video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<h1>Happy Birthday My Love 💖</h1>

<div class="memories">Memories 💖</div>

<button id="musicBtn">💖 Click to Play Music</button>

<div class="slider">

  <!-- PHOTOS -->
  <div class="slide active"><img src="photo1.jpg"></div>
  <div class="slide"><img src="photo2.jpg"></div>
  <div class="slide"><img src="photo3.jpg"></div>
  <div class="slide"><img src="photo4.jpg"></div>
  <div class="slide"><img src="photo5.jpg"></div>
  <div class="slide"><img src="photo6.jpg"></div>
  <div class="slide"><img src="photo7.jpg"></div>
  <div class="slide"><img src="photo8.jpg"></div>
  <div class="slide"><img src="photo9.jpg"></div>

  <!-- VIDEOS -->
  <div class="slide"><video src="video1.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video2.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video3.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video4.mp4" muted playsinline></video></div>
  <div class="slide"><video src="video5.mp4" muted playsinline></video></div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const music = document.getElementById("bgMusic");
  const btn = document.getElementById("musicBtn");

  // 🎵 MUSIC CONTROL
  btn.addEventListener("click", () => {

    if (music.paused) {
      music.volume = 0;
      music.play();

      // fade in
      let v = 0;
      let fade = setInterval(() => {
        if (v < 0.5) {
          v += 0.05;
          music.volume = v;
        } else {
          clearInterval(fade);
        }
      }, 150);

      btn.innerText = "🔇 Pause Music";

    } else {
      music.pause();
      btn.innerText = "💖 Play Music";
    }

  });

  // 🎞 SLIDESHOW
  let slides = document.querySelectorAll(".slide");
  let index = 0;
  let timer;

  function stopVideos() {
    slides.forEach(s => {
      let v = s.querySelector("video");
      if (v) {
        v.pause();
        v.currentTime = 0;
      }
    });
  }

  function showSlide(i) {

    clearTimeout(timer);
    stopVideos();

    slides.forEach(s => s.classList.remove("active"));

    let current = slides[i];
    current.classList.add("active");

    let video = current.querySelector("video");

    if (video) {
      video.play().catch(() => {
        timer = setTimeout(nextSlide, 3000);
      });
      video.onended = nextSlide;
    } else {
      timer = setTimeout(nextSlide, 5000);
    }
  }

  function nextSlide() {
    index = (index + 1) % slides.length;
    showSlide(index);
  }

  showSlide(index);

});
</script>

</body>
</html>
